<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Oops!</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #764ba2;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            background: #ed3030e2;
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 40px;
        }

        p {
            font-size: 18px;
            opacity: 0.9;
        }
    </style>
  </head>
  <body>
    <div class="container">
    <h1>Oops!</h1>
    <p>Sorry, I don't know what you're asking for.</p>
  </div>
  </body>
</html>
